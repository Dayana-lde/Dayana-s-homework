<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div> <form action="">
    <h1>Your random number is:</h1>
    <h3></h3>

    <label for="lower">Lower limit</label>
    <input type="number" id="lower" placeholder="enter value.." required>
    <br>
    <label for="upper">upper limit</label>
    <input type="number" id="upper" placeholder="enter value.." required>
    <button id="generateBtn" >Generate</button>
    <button id="clearBtn">Clear</button>
    </form>
   </div>
   <script>const result = document.querySelector("h3"); 
    const lower = document.querySelector("#lower");
    const upper = document.querySelector("#upper");
    const generateBtn = document.querySelector("#generateBtn");
    const clearBtn = document.querySelector("#clearBtn");
    
    
    generateBtn.addEventListener("click", function(event){
    event.preventDefault();
    let min = Number(lower.value);
    let max = Number(upper.value)
    if (min < max){
    const calculate = Math.floor(Math.random() * (max - min + 1) ) + min;
    result.innerHTML = calculate;
    console.log(result);
    }
    else{
        result.innerHTML = "error";
    }
    
    });
    
    clearBtn.addEventListener("click", function() {
        result.innerHTML = "";
        upper.value = "";
        lower.value = "";
    });
    </script>
</body>
</html>
